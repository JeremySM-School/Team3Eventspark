<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Provider Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4 custom-navbar">
        <div class="container">
            <a class="navbar-brand" href="../home/home.html"><i class="bi bi-stars"></i>EventSpark Provider</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link active" href="p_dashboard.html">Dashboard</a>
                <a class="nav-link" href="p_inbox.html">Inbox</a>
                <a class="nav-link" href="p_profile.html">My Profile</a>
                <a class="nav-link text-warning" href="../home/home.html">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-4">
            <div class="col-md-4"><div class="card p-3 text-center"><h3>12</h3><p>Upcoming Gigs</p></div></div>
            <div class="col-md-4"><div class="card p-3 text-center"><h3>$2,400</h3><p>Revenue (Feb)</p></div></div>
            <div class="col-md-4"><div class="card p-3 text-center"><h3>4.9 ⭐</h3><p>Rating</p></div></div>
        </div>

        <div class="row g-4">
            <div class="col-md-6">
                <div class="card h-100">
                    <div class="card-header fw-bold bg-white">Management</div>
                    <div class="card-body d-grid gap-2">
                        <a href="packages.html" class="btn btn-outline-primary text-start"><i class="bi bi-box-seam"></i> Manage Packages</a>
                        <a href="calendar.html" class="btn btn-outline-primary text-start"><i class="bi bi-calendar-week"></i> Update Availability</a>
                        <a href="edit_p_profile.html" class="btn btn-outline-primary text-start"><i class="bi bi-person-gear"></i> Edit Profile</a>
                        <a href="p_reviews.html" class="btn btn-outline-primary text-start"><i class="bi bi-chat-heart"></i> View Reviews</a>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card h-100">
                    <div class="card-header fw-bold bg-white">Recent Inquiries</div>
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item d-flex justify-content-between">
                            <span>Alice (Wedding)</span>
                            <span class="badge bg-warning text-dark">Pending</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between">
                            <span>Bob (Party)</span>
                            <span class="badge bg-success">Confirmed</span>
                        </li>
                    </ul>
                    <div class="card-body">
                        <a href="p_inbox.html" class="btn btn-sm btn-primary w-100">View All</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews | EventSpark</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg custom-navbar">
        <div class="container">
            <a class="navbar-brand fs-3" href="../home/home.html"><i class="bi bi-stars"></i> EventSpark</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="p_dashboard.html">Back to Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h2 class="mb-4 fw-bold">Fan Love (Customer Reviews)</h2>
        
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <div class="d-flex justify-content-between">
                    <h5 class="fw-bold">Drake <span class="text-warning ms-2">★★★★★</span></h5>
                    <small class="text-muted">Oct 10, 2026</small>
                </div>
                <p class="mb-3">"Major key alert. Best DJ in the game. Brought the whole OVO crew out."</p>
                
                <div class="bg-light p-3 rounded border">
                    <label class="small fw-bold mb-2">Reply to Drake:</label>
                    <div class="input-group">
                        <input type="text" class="form-control" placeholder="Write a response...">
                        <button class="btn btn-primary fw-bold">Post Reply</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <div class="d-flex justify-content-between">
                    <h5 class="fw-bold">Justin Bieber <span class="text-warning ms-2">★★★★★</span></h5>
                    <small class="text-muted">Sep 22, 2026</small>
                </div>
                <p class="mb-2">"We the best music! Popstar energy all night."</p>
                
                <div class="ms-4 mt-3 ps-3 border-start border-4 border-primary">
                    <small class="fw-bold text-primary">You replied:</small>
                    <p class="small text-muted mb-0">"Bless up! Appreciate you, family. God did!"</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

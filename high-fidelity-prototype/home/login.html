<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EventSpark | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-100" style="background-color: var(--wood-dark);">

    <div class="card p-5 shadow-lg text-center" style="width: 400px; border-top: 5px solid var(--gold-accent);">
        
        <a href="home.html" class="text-decoration-none mb-4 d-block">
            <h2 class="fw-bold" style="color: var(--wood-dark);"><i class="bi bi-stars"></i> EventSpark</h2>
        </a>

        <h4 class="mb-4 text-muted">Welcome Back</h4>

        <div class="d-grid gap-3 mb-4">
            <a href="../provider/p_dashboard.html" class="btn btn-primary btn-lg shadow-sm">
                <i class="bi bi-briefcase-fill me-2"></i>Login as Provider

            <a href="../customer/c_dashboard.html" class="btn btn-outline-primary btn-lg">

            </a>
        </div>

        <hr class="text-muted">

        <p class="mb-3">New here? <a href="signup.html" class="fw-bold text-decoration-none" style="color: var(--wood-light);">Create Account</a></p>
        
        <a href="home.html" class="btn btn-sm btn-light text-muted w-100">

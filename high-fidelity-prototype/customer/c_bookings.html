<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> My Bookings | EventSpark</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
   <nav class="navbar navbar-expand-lg custom-navbar">
        <div class="container">
            <a class="navbar-brand fs-3" href="../home/home.html">EventSpark</a>
            <div class="navbar-nav ms-auto"><a class="nav-link" href="c_dashboard.html">Back to Dashboard</a></div>
        </div>
    </nav>

    <div class="container py-5">
        <h2 class="mb-4 fw-bold">My Event Bookings</h2>
        
        <div class="card mb-3 border-start border-4 border-success">
            <div class="card-body">
                <div class="row align-items-center">
                    <div class="col-md-2 text-center">
                        <h3 class="mb-0 fw-bold">12</h3>
                        <small class="text-uppercase fw-bold text-muted">Oct</small>
                    </div>
                    <div class="col-md-6">
                        <h5 class="fw-bold mb-1">Wedding Reception</h5>
                        <p class="text-muted mb-0"><i class="bi bi-person-check"></i> DJ Khaled • Gold Package</p>
                    </div>
                    <div class="col-md-4 text-end">
                        <span class="badge bg-success mb-2">Confirmed</span><br>
                        <a href="c_inbox.html" class="btn btn-sm btn-outline-primary">Message</a>
                        <button class="btn btn-sm btn-outline-danger" disabled>Cancel</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3 border-start border-4 border-warning">
            <div class="card-body">
                <div class="row align-items-center">
                    <div class="col-md-2 text-center">
                        <h3 class="mb-0 fw-bold">05</h3>
                        <small class="text-uppercase fw-bold text-muted">Nov</small>
                    </div>
                    <div class="col-md-6">
                        <h5 class="fw-bold mb-1">Birthday Bash</h5>
                        <p class="text-muted mb-0"><i class="bi bi-music-note-beamed"></i> Michael Bublé • Basic Set</p>
                    </div>
                    <div class="col-md-4 text-end">
                        <span class="badge bg-warning text-dark mb-2">Pending Approval</span><br>
                        <button class="btn btn-sm btn-outline-danger">Cancel Request</button>
                    </div>
                </div>
            </div>
        </div>
    <div class="card mb-3 bg-light opacity-75">
            <div class="card-body">
                <div class="row align-items-center">
                    <div class="col-md-2 text-center text-muted">
                        <h3 class="mb-0 fw-bold">20</h3>
                        <small class="text-uppercase fw-bold">Sep</small>
                    </div>
                    <div class="col-md-6">
                        <h5 class="fw-bold mb-1 text-muted">Summer Party</h5>
                        <p class="text-muted mb-0">Vincent van Gogh</p>
                    </div>
                    <div class="col-md-4 text-end">
                        <span class="badge bg-secondary mb-2">Completed</span><br>
                        <a href="c_reviews.html" class="btn btn-sm btn-warning">Write Review</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
